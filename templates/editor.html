<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo Pro Python IDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0b1120; --panel: #1e293b; --accent: #38bdf8; --success: #10b981; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* RGB Title Animation */
        @keyframes rgbText {
            0% { color: #ff0000; } 33% { color: #00ff00; } 66% { color: #0000ff; } 100% { color: #ff0000; }
        }
        .rgb-title { font-weight: bold; font-size: 16px; animation: rgbText 3s infinite linear; text-transform: uppercase; letter-spacing: 1px; }

        .toolbar { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; }
        
        .btn-group { display: flex; gap: 10px; }
        .run-btn { background: var(--success); color: white; border: none; padding: 8px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .pdf-btn { background: #ef4444; color: white; border: none; padding: 8px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* Quick Symbols Toolbar */
        .quick-tools { background: #0f172a; padding: 5px 15px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #334155; }
        .tool-btn { background: #1e293b; color: var(--accent); border: 1px solid #334155; padding: 4px 12px; border-radius: 4px; font-family: monospace; cursor: pointer; white-space: nowrap; }
        .tool-btn:hover { background: #334155; }

        /* Content for PDF */
        #content-to-export { display: flex; flex: 1; overflow: hidden; }
        @media (max-width: 768px) { #content-to-export { flex-direction: column; } }
        
        #editor { flex: 1; font-size: 16px; border-right: 2px solid #334155; }
        
        .output-container { flex: 1; display: flex; flex-direction: column; background: #000; }
        .output-header { background: #111827; padding: 10px; font-size: 12px; color: var(--accent); border-bottom: 1px solid #334155; }
        #output { flex: 1; padding: 15px; font-family: 'Fira Code', monospace; color: #00ff41; overflow-y: auto; white-space: pre-wrap; margin: 0; font-size: 14px; }
        
        .error-text { color: #ef4444; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="rgb-title">PY EDITOR BY ANONDO</div>
    <div class="btn-group">
        <button class="run-btn" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
        <button class="pdf-btn" onclick="saveAsPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
    </div>
</div>

<div class="quick-tools">
    <button class="tool-btn" onclick="insertText('print(\"\")')">print()</button>
    <button class="tool-btn" onclick="insertText('input(\"\")')">input()</button>
    <button class="tool-btn" onclick="insertText('if  :\n    ')">if</button>
    <button class="tool-btn" onclick="insertText('for i in range( ):\n    ')">for</button>
    <button class="tool-btn" onclick="insertText('while  :\n    ')">while</button>
    <button class="tool-btn" onclick="insertText('def  ():\n    ')">def</button>
    <button class="tool-btn" onclick="insertText('import ')">import</button>
    <button class="tool-btn" onclick="insertText(' : ')">:</button>
    <button class="tool-btn" onclick="insertText('\"\"')">\"\"</button>
    <button class="tool-btn" onclick="insertText('    ')">Tab</button>
</div>

<div id="content-to-export">
    <div id="editor"># Anondo's Advanced Python IDE
# Real-time execution with PDF Export

def hello_world():
    print("Py Editor by Anondo Kumar Roy")
    print("-" * 30)
    for i in range(1, 4):
        print(f"Loop Step: {i}")

hello_world()</div>

    <div class="output-container">
        <div class="output-header"><i class="fas fa-terminal"></i> CONSOLE OUTPUT</div>
        <pre id="output"></pre>
    </div>
</div>

<script>
    // 1. Initialize Ace Editor
    var editor = ace.edit("editor");
    editor.setTheme("ace/theme/one_dark");
    editor.session.setMode("ace/mode/python");
    editor.setShowPrintMargin(false);

    // 2. Toolbar Function
    function insertText(text) {
        editor.insert(text);
        editor.focus();
    }

    // 3. Skulpt Setup
    function outf(text) { 
        var mypre = document.getElementById("output"); 
        mypre.innerHTML = mypre.innerHTML + text; 
    } 
    function builtinRead(x) {
        if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
            throw "File not found: '" + x + "'";
        return Sk.builtinFiles["files"][x];
    }

    // 4. Main Run Function
    function runCode() {
        var code = editor.getValue();
        var outputArea = document.getElementById("output");
        outputArea.innerHTML = ''; 

        Sk.pre = "output";
        Sk.configure({output:outf, read:builtinRead}); 
        
        var myPromise = Sk.misceval.asyncToPromise(function() {
            return Sk.importMainWithBody("<stdin>", false, code, true);
        });

        myPromise.then(function(mod) {
            // Success
        }, function(err) {
            outputArea.innerHTML = '<span class="error-text">' + err.toString() + '</span>';
        });
    }

    // 5. PDF Export
    function saveAsPDF() {
        const element = document.getElementById('content-to-export');
        const opt = {
            margin:       0.3,
            filename:     'Anondo_Python_Code.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, backgroundColor: '#0b1120' },
            jsPDF:        { unit: 'in', format: 'letter', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    }

    // 6. Real-time Logic (1s delay)
    let timeout = null;
    editor.getSession().on('change', function() {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            runCode();
        }, 1000);
    });

    window.onload = runCode;
</script>
</body>
</html>
