<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo Ultra Font Engine v5.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff41; --sky: #38bdf8; --bg: #020617; --card: #0f172a; --pink: #f472b6; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 10px; text-align: center; }
        
        .sticky-top { position: sticky; top: 0; background: var(--bg); padding: 15px 0; z-index: 1000; border-bottom: 2px solid #1e293b; }
        .main-input { 
            width: 90%; max-width: 500px; padding: 15px; background: var(--card); border: 2px solid #1e293b; 
            border-radius: 12px; color: white; font-size: 18px; outline: none; margin-bottom: 10px;
        }

        .lang-select {
            width: 90%; max-width: 500px; padding: 10px; background: #1e293b; color: var(--sky);
            border: 1px solid #334155; border-radius: 8px; margin-bottom: 10px; outline: none;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: auto; }
        .btn {
            padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .gen-btn { background: linear-gradient(45deg, #38bdf8, #00ff41); color: black; }
        .trans-btn { background: var(--pink); color: black; }
        .btn:active { transform: scale(0.95); }

        .results { display: grid; gap: 10px; max-width: 600px; margin: 20px auto; }
        .font-card { 
            background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #1e293b;
            display: flex; justify-content: space-between; align-items: center;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .font-text { font-size: 18px; flex: 1; text-align: left; overflow-wrap: anywhere; }
        .copy-btn { background: var(--sky); color: black; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div style="color:var(--sky); font-weight:bold; margin:10px 0;">ANONDO ULTRA ENGINE v5.0</div>

<div class="sticky-top">
    <input type="text" id="nameInput" class="main-input" placeholder="এখানে নাম বা বাক্য লিখুন..." oninput="autoGenerate()">
    
    <select id="targetLang" class="lang-select">
        <option value="en">English</option><option value="bn">Bangla</option><option value="hi">Hindi</option>
        <option value="ur">Urdu</option><option value="ar">Arabic</option><option value="zh-CN">Chinese</option>
        <option value="ko">Korean</option><option value="ja">Japanese</option><option value="ru">Russian</option>
    </select>

    <div class="btn-group">
        <button class="btn trans-btn" onclick="translateText()"><i class="fas fa-language"></i> TRANSLATE</button>
        <button class="btn gen-btn" onclick="randomGenerate()"><i class="fas fa-magic"></i> RANDOM FONT</button>
    </div>
</div>

<div id="results" class="results"></div>

<script>
    // ২৫+ ফন্ট স্টাইল ম্যাপ
    const fmaps = {
        bubble: "ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ",
        black_bubble: "🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙🅚🅛🅜🅝🅞🅟🅠🅡🅢🅣🅤🅥🅦🅧🅨🅩",
        bold: "𝐚𝐛𝐜𝐝𝐞𝐟𝐠𝐡𝐢𝐣𝐤𝐥𝐦𝐧𝐨𝐩𝐪𝐫𝐬𝐭𝐮𝐯𝐰𝐱𝐲𝐳",
        italic: "𝘢𝘣𝘤𝘥𝘦𝘧𝘨𝘩𝘪𝘫𝘬𝘭𝘮𝘯𝘰𝘱𝘲𝘳𝘴𝘵𝘶𝘷𝘸𝘹𝘺𝘻",
        bold_italic: "𝙖𝙗𝙘𝙙𝙚𝙛𝙜𝙝𝙞𝙟𝙠𝙡𝙢𝙣𝙤𝙥𝙦𝙧𝙨𝙩𝙪𝙫𝙬𝙭𝙮𝙯",
        mono: "𝚊𝚋𝚌𝚍𝚎𝚏𝚐𝚑𝚒𝚓𝚔𝚕𝚖𝚗𝚘𝚙𝚚𝚛𝚜𝚝𝚞𝚟𝚠𝚡𝚢𝚣",
        script: "𝒶𝒷𝒸𝒹𝑒𝒻𝑔𝒽𝒾𝒿𝓀𝓁𝓂𝓃𝑜𝓅𝓆𝓇𝓈𝓉𝓊𝓋𝓌𝓍𝓎𝓏",
        bold_script: "𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃",
        fraktur: "𝔞𝔟𝔡𝔢𝔣𝔤𝔥𝔦𝔧𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷",
        bold_fraktur: "𝖆𝖇𝖈𝖉𝖊𝖋𝖌𝖍𝖎𝖏𝖐𝖑𝖒𝖓𝖔𝖕𝖖𝖗𝖘𝖙𝖚𝖛𝖜𝖝𝖞𝖟",
        square: "🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉",
        black_square: "🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉", // Fallback
        tiny: "ᵃᵇᶜᵈᵉᶠᵍʰⁱʲᵏˡᵐⁿᵒᵖᵠʳˢᵗᵘᵛʷˣʸᶻ",
        inverted: "ɐqɔpǝɟƃɥᴉɾʞlɯuodbɹsʇnʌʍxʎz",
        fancy1: "αႦƈԃҽϝɠԋιʝƙʅɱɳσρϙɾʂɬυʋɯxყȥ",
        fancy2: "ค๒ς๔єŦﻮђเןкɭ๓ภ๏קợгรՇยשฬץאչ",
        fancy3: "ﾑ乃cd乇ｷgんﾉﾌズﾚM刀のｱq尺丂ｲひ√Wﾒﾘ乙",
        fancy4: "αɓcɗεƒɠɦเʝҡℓɱɳσρҩ૨รƭµѵωאყƶ",
        fancy5: "ΛBCDΣFGΉIJKLMПӨPQRSTUVWXYZ",
        fancy6: "卂乃匚刀乇下厶卄工丁长乚从𠘨口尸㔿尺丂丅凵リ山乂丫乙",
        fancy7: "ค๖с๔єŦցհіյƙӏตոօթԛɾտհսѵա×վչ",
        fancy8: "ÄßÇÐÈfGHÌJKLMñÖPQR§†ÜVWX¥Z",
        fancy9: "ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ",
        tail: "a̲b̲c̲d̲e̲f̲g̲h̲i̲j̲k̲l̲m̲n̲o̲p̲q̲r̲s̲t̲u̲v̲w̲x̲y̲z̲",
        slash: "a̸b̸c̸d̸e̸f̸g̸h̸i̸j̸k̸l̸m̸n̸o̸p̸q̸r̸s̸t̸u̸v̸w̸x̸y̸z̸",
        strike: "a̶b̶m̶d̶e̶f̶g̶h̶i̶j̶k̶l̶m̶n̶o̶p̶q̶r̶s̶t̶u̶v̶w̶x̶y̶z̶"
    };

    const abc = "abcdefghijklmnopqrstuvwxyz";
    
    // বিশাল সিম্বল লাইব্রেরি
    const symbolsL = ["꧁", "亗", "★", "『", "〆", "父", "༺", "×", "么", "๏", "【", "彡", "๛", "⚡", "☯", "✞", "⫷", "☣", "☪", "❂", "♔", "♕", "♖", "♗", "♘", "♙", "✿", "♨", "✈", "♪", "⚓", "⚔️", "⛏️", "🛡️"];
    const symbolsR = ["꧂", "亗", "★", "』", "〆", "父", "༻", "×", "么", "๏", "】", "彡", "๛", "⚡", "☯", "✞", "⫸", "☣", "☪", "❂", "♔", "♕", "♖", "♗", "♘", "♙", "✿", "♨", "✈", "♪", "⚓", "⚔️", "⛏️", "🛡️"];

    function autoGenerate() {
        const input = document.getElementById('nameInput').value;
        const out = document.getElementById('results');
        if(!input) { out.innerHTML = ""; return; }
        out.innerHTML = "";

        // ইংলিশ ফন্ট জেনারেশন (২৫+ স্টাইল)
        if(/[a-zA-Z]/.test(input)) {
            Object.keys(fmaps).forEach(key => {
                let styled = "";
                for(let char of input.toLowerCase()) {
                    let idx = abc.indexOf(char);
                    styled += (idx > -1) ? Array.from(fmaps[key])[idx] : char;
                }
                createCard(styled);
            });
        }

        // স্ট্যান্ডার্ড ডেকোরেশন
        createCard(`꧁${input}꧂`);
        createCard(`亗 ${input} 亗`);
        createCard(`★彡 ${input} 彡★`);
    }

    function randomGenerate() {
        const input = document.getElementById('nameInput').value;
        const out = document.getElementById('results');
        if(!input) return;
        out.innerHTML = "";
        for(let i = 0; i < 30; i++) {
            let l = symbolsL[Math.floor(Math.random() * symbolsL.length)];
            let r = symbolsR[Math.floor(Math.random() * symbolsR.length)];
            let mid = Math.random() > 0.5 ? " • " : " × ";
            createCard(`${l}${mid}${input}${mid}${r}`);
        }
    }

    async function translateText() {
        const text = document.getElementById('nameInput').value;
        const lang = document.getElementById('targetLang').value;
        if(!text) return;
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${lang}&dt=t&q=${encodeURI(text)}`);
        const data = await res.json();
        document.getElementById('nameInput').value = data[0][0][0];
        autoGenerate();
    }

    function createCard(text) {
        const div = document.createElement('div');
        div.className = 'font-card';
        div.innerHTML = `<span class="font-text">${text}</span> <button class="copy-btn" onclick="copyText('${text}', this)">COPY</button>`;
        document.getElementById('results').appendChild(div);
    }

    function copyText(text, btn) {
        navigator.clipboard.writeText(text);
        btn.innerText = "DONE";
        setTimeout(() => { btn.innerText = "COPY"; }, 800);
    }
</script>
</body>
</html>
