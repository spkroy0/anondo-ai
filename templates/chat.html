<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turmax AI - Chat</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #e2e8f0; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        /* Header */
        .header { 
            background: #1e293b; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid #38bdf8;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header h2 { margin: 0; color: #38bdf8; font-size: 1.2rem; }

        /* Chat Container */
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }

        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user-message { 
            align-self: flex-end; 
            background: #38bdf8; 
            color: #0f172a; 
            border-bottom-right-radius: 2px; 
        }
        .ai-message { 
            align-self: flex-start; 
            background: #1e293b; 
            color: #f1f5f9; 
            border-bottom-left-radius: 2px;
            border: 1px solid #334155;
        }

        /* Input Area */
        .input-area { 
            background: #1e293b; 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #334155;
        }
        input { 
            flex: 1; 
            background: #0f172a; 
            border: 1px solid #334155; 
            padding: 12px; 
            border-radius: 8px; 
            color: white; 
            outline: none; 
        }
        input:focus { border-color: #38bdf8; }
        
        button { 
            background: #38bdf8; 
            border: none; 
            color: #0f172a; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button:hover { background: #0ea5e9; }

        /* Typing Indicator */
        .typing { font-size: 12px; color: #94a3b8; display: none; margin-bottom: 10px; }

        .back-btn {
            position: absolute;
            left: 15px;
            top: 15px;
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="/" class="back-btn">← Home</a>
        <h2>🚀 Turmax AI</h2>
    </div>

    <div id="chat-container">
        <div class="message ai-message">Hi Anondo! Ki obostha? Ami ready tumake help korar jonno. (Banglish e kotha bolbo)</div>
    </div>

    <div id="typing-indicator" class="typing" style="padding-left: 20px;">Turmax is thinking...</div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Display user message
            appendMessage('user-message', message);
            userInput.value = '';

            // Show typing indicator
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/get_response', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Hide typing indicator and display AI response
                typingIndicator.style.display = 'none';
                appendMessage('ai-message', data.reply);

            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage('ai-message', 'Error: Connect korte parchi na. Network check koro.');
            }
        }

        function appendMessage(className, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
