<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo AI | Turmax Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b1120; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .chat-wrapper { width: 100%; max-width: 500px; height: 90vh; background: #1e293b; border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; position: relative; }
        
        /* Header */
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; background: #1e293b; border-radius: 20px 20px 0 0; }
        .header-info { display: flex; align-items: center; gap: 10px; }
        .dot { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Chat Display Area */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; display: flex; flex-direction: column; gap: 15px; background: #0f172a; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .bot-msg { align-self: flex-start; background: #1e293b; color: #38bdf8; border-bottom-left-radius: 2px; }
        .user-msg { align-self: flex-end; background: #38bdf8; color: #0f172a; font-weight: 500; border-bottom-right-radius: 2px; }

        /* Input Area */
        .input-area { padding: 15px; background: #1e293b; border-radius: 0 0 20px 20px; display: flex; gap: 10px; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 10px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #38bdf8; }
        button { background: #38bdf8; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; color: #0f172a; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        button:disabled { background: #475569; cursor: not-allowed; }

        .back-home { position: absolute; top: -40px; left: 10px; color: #94a3b8; text-decoration: none; font-size: 14px; }
        
        /* Scrollbar Styling */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Home এ ফিরে যাও</a>
    
    <div class="chat-header">
        <div class="header-info">
            <div class="dot"></div>
            <span style="font-weight: 600;">Turmax AI (Online)</span>
        </div>
        <i class="fas fa-robot" style="color: #38bdf8;"></i>
    </div>

    <div id="chat-box">
        <div class="msg bot-msg"><b>AI:</b> Ki obostha Anondo? Ami Turmax AI, boloto ki help korte pari? Ami ekhon onek beshi smart!</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Banglish এ মেসেজ লিখুন..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="askAI()">Send</button>
    </div>
</div>

<script>
    async function askAI() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const btn = document.getElementById('send-btn');
        
        if (!input.value.trim()) return;

        const userMsg = input.value.trim();
        input.value = '';
        
        // ইউজারের মেসেজ স্ক্রিনে দেখানো
        box.innerHTML += `<div class="msg user-msg">${userMsg}</div>`;
        box.scrollTop = box.scrollHeight;

        // বাটন লোডিং স্টেট
        btn.disabled = true;
        btn.innerText = "...";

        try {
            const response = await fetch('/chat_api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMsg })
            });

            const data = await response.json();
            
            // এআই-এর মেসেজ স্ক্রিনে দেখানো
            box.innerHTML += `<div class="msg bot-msg"><b>Turmax AI:</b> ${data.response}</div>`;
        } catch (error) {
            box.innerHTML += `<div class="msg bot-msg" style="color: #ef4444;"><b>System:</b> Connection lost! Server checking koro.</div>`;
        }

        btn.disabled = false;
        btn.innerText = "Send";
        box.scrollTop = box.scrollHeight;
    }

    // এন্টার বাটন চাপলে মেসেজ যাবে
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            askAI();
        }
    }
</script>

</body>
</html>
