<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turmax AI | Chat</title>
    <style>
        body { font-family: sans-serif; background: #0b1120; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 450px; background: #1e293b; padding: 20px; border-radius: 20px; }
        #chat-box { height: 350px; overflow-y: auto; background: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #334155; }
        .input-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #0f172a; color: white; outline: none; }
        button { background: #38bdf8; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2 style="color:#38bdf8; text-align:center;">🤖 Turmax AI</h2>
        <div id="chat-box"><div>AI: Ki obostha Anondo? Bolo ki help korbo.</div></div>
        <div class="input-area">
            <input type="text" id="user-msg" placeholder="Banglish e kotha bolo...">
            <button onclick="send()">Send</button>
        </div>
        <br><center><a href="/" style="color:#94a3b8; text-decoration:none; font-size:13px;">← Back to Home</a></center>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('user-msg');
            const box = document.getElementById('chat-box');
            if(!input.value) return;
            box.innerHTML += `<div style="margin-top:10px;">You: ${input.value}</div>`;
            const msg = input.value; input.value = '';
            const res = await fetch('/chat_api', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            box.innerHTML += `<div style="color:#38bdf8; margin-top:8px;">AI: ${data.response}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
