<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anondo AI | Turmax Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; 
            margin: 0; 
            background: #0b1120; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        /* মেইন কন্টেইনার যা কিবোর্ডের সাথে সাইজ বদলাবে */
        .chat-wrapper { 
            display: flex;
            flex-direction: column;
            height: 100dvh; /* dynamic viewport height */
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto;
            background: #1e293b; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border-left: 1px solid #334155;
            border-right: 1px solid #334155;
            position: relative; 
        }
        
        /* Header */
        .chat-header { 
            padding: 15px 20px; 
            border-bottom: 1px solid #334155; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #1e293b; 
        }
        .header-info { display: flex; align-items: center; gap: 10px; }
        .dot { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Chat Display Area */
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #0f172a; 
            scroll-behavior: smooth;
        }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .bot-msg { align-self: flex-start; background: #1e293b; color: #38bdf8; border-bottom-left-radius: 2px; }
        .user-msg { align-self: flex-end; background: #38bdf8; color: #0f172a; font-weight: 500; border-bottom-right-radius: 2px; }

        /* Input Area - এটি কিবোর্ডের একদম উপরে থাকবে */
        .input-area { 
            padding: 15px; 
            background: #1e293b; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #334155;
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }
        input { 
            flex: 1; 
            background: #0f172a; 
            border: 1px solid #334155; 
            padding: 12px; 
            border-radius: 10px; 
            color: white; 
            outline: none; 
            transition: 0.3s;
            font-size: 16px; /* জুম সমস্যা রোধ করবে */
        }
        input:focus { border-color: #38bdf8; }
        button { 
            background: #38bdf8; 
            border: none; 
            padding: 0 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            color: #0f172a; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; }

        .back-link { color: #94a3b8; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        
        /* Scrollbar Styling */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div class="chat-header">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Home</a>
        <div class="header-info">
            <div class="dot"></div>
            <span style="font-weight: 600; color: white;">Turmax AI (Online)</span>
        </div>
        <i class="fas fa-robot" style="color: #38bdf8;"></i>
    </div>

    <div id="chat-box">
        <div class="msg bot-msg"><b>AI:</b> Hii! Ki obostha? Ami Turmax AI. My boss "Anondo", boloto ki help korte pari? Ami ekhon onek beshi smart!</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Banglish এ মেসেজ লিখুন..." autocomplete="off">
        <button id="send-btn" onclick="askAI()">Send</button>
    </div>
</div>

<script>
    const box = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    async function askAI() {
        const userMsg = input.value.trim();
        if (!userMsg) return;

        input.value = '';
        
        // ইউজারের মেসেজ
        box.innerHTML += `<div class="msg user-msg">${userMsg}</div>`;
        box.scrollTop = box.scrollHeight;

        // বাটন লোডিং
        btn.disabled = true;
        btn.innerText = "...";

        try {
            const response = await fetch('/chat_api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMsg })
            });

            const data = await response.json();
            
            // এআই-এর মেসেজ
            box.innerHTML += `<div class="msg bot-msg"><b>Turmax AI:</b> ${data.response}</div>`;
        } catch (error) {
            box.innerHTML += `<div class="msg bot-msg" style="color: #ef4444;"><b>System:</b> Connection lost! Server checking koro.</div>`;
        }

        btn.disabled = false;
        btn.innerText = "Send";
        box.scrollTop = box.scrollHeight;
    }

    // এন্টার বাটন ফিক্স
    input.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            askAI();
        }
    });

    // কিবোর্ড ওপেন হলে স্ক্রল ফিক্স
    input.addEventListener('focus', () => {
        setTimeout(() => {
            box.scrollTop = box.scrollHeight;
        }, 300);
    });
</script>

</body>
</html>
