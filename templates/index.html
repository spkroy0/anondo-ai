<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo's Digital Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .hub-container { text-align: center; padding: 20px; width: 90%; max-width: 500px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; margin-bottom: 30px; }
        
        .menu-grid { display: grid; gap: 20px; }
        .menu-item { 
            background: #1e293b; padding: 20px; border-radius: 15px; text-decoration: none; color: white;
            transition: transform 0.3s, background 0.3s; border: 1px solid #334155; display: flex; align-items: center; justify-content: space-between;
        }
        .menu-item:hover { transform: translateY(-5px); background: #334155; border-color: #38bdf8; }
        .icon { font-size: 24px; }
        .text-group { text-align: left; }
        .title { display: block; font-weight: bold; font-size: 18px; }
        .desc { font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="hub-container">
        <h1>Anondo Kumar Roy</h1>
        <p>Welcome to my personal AI & Tool hub.</p>
        
        <div class="menu-grid">
            <a href="/chat" class="menu-item">
                <div class="text-group">
                    <span class="title">🤖 Anondo AI Chat</span>
                    <span class="desc">Talk with my personalized AI assistant</span>
                </div>
                <span class="icon">➜</span>
            </a>

            <a href="https://download.anondo.bro.bd" class="menu-item">
                <div class="text-group">
                    <span class="title">📥 Social Downloader</span>
                    <span class="desc">Download HD videos & music</span>
                </div>
                <span class="icon">➜</span>
            </a>
        </div>

        <div style="margin-top: 40px; font-size: 12px; color: #475569;">
            © 2026 Anondo Roy | All Rights Reserved
        </div>
    </div>
</body>
</html>
