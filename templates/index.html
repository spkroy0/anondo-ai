<!DOCTYPE html>
<html lang="en">
<head>

    <title>Anondo Kumar Roy | Hub</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b1120; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #1e293b; padding: 40px 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #38bdf8; padding: 5px; margin-bottom: 15px; object-fit: cover; }
        h1 { font-size: 24px; color: #38bdf8; margin: 10px 0; }
        .bio { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }

        /* Social Icons */
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .social-icons a { color: #94a3b8; font-size: 24px; transition: 0.3s; text-decoration: none; }
        .social-icons a:hover { color: #38bdf8; transform: translateY(-3px); }

        /* Action Buttons */
        .action-btns { display: flex; flex-direction: column; gap: 15px; }
        .main-btn { padding: 16px; border-radius: 15px; text-decoration: none; font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; border: none; cursor: pointer; }
        .btn-ai { background: linear-gradient(45deg, #38bdf8, #2563eb); color: white; }
        .btn-dl { background: linear-gradient(45deg, #10b981, #059669); color: white; }
        .main-btn:hover { transform: scale(1.03); filter: brightness(1.1); }

        .footer { margin-top: 30px; font-size: 11px; color: #475569; letter-spacing: 1px; }
    </style>
</head>
