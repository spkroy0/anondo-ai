<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b1120; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .card { background: #1e293b; padding: 40px 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        @keyframes rgbBlink {
            0%   { color: rgb(255, 0, 0); }
            17%  { color: rgb(255, 255, 0); }
            33%  { color: rgb(0, 255, 0); }
            50%  { color: rgb(0, 255, 255); }
            67%  { color: rgb(0, 0, 255); }
            83%  { color: rgb(255, 0, 255); }
            100% { color: rgb(255, 0, 0); }
        }

        .card h1 { 
            font-size: 26px; 
            margin: 20px 0 10px 0; 
            font-weight: 600; 
            letter-spacing: 1px;
            animation: rgbBlink 4s infinite linear;
        }
        
        .bio { font-size: 14px; color: #94a3b8; margin-bottom: 25px; line-height: 1.5; font-weight: 300; }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .social-icons a { color: #94a3b8; font-size: 24px; transition: 0.3s; text-decoration: none; }
        .social-icons a:hover { color: #38bdf8; transform: translateY(-3px); }

        .action-btns { display: flex; flex-direction: column; gap: 12px; }
        
        .btn { padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; border: none; cursor: pointer; }
        
        /* বাটনের রঙগুলো */
        .btn-ai { background: #38bdf8; color: #0b1120; }
        .btn-c { background: #0ea5e9; color: white; } /* C Editor Button */
        .btn-py { background: #fbbf24; color: #0b1120; }
        .btn-font { background: #a855f7; color: white; }
        .btn-dl { background: #10b981; color: white; }
        .btn-web { background: #ef4444; color: white; }

        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        .footer-text { margin-top: 30px; font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid #334155; padding-top: 15px; }
    </style>
</head>
