<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo's Hub</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { 
            margin-bottom: 40px; 
            color: #38bdf8; 
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            width: 90%; 
            max-width: 350px; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            text-decoration: none; 
            color: white; 
            transition: all 0.3s ease; 
            backdrop-filter: blur(10px);
        }
        .card:hover { 
            border-color: #38bdf8; 
            transform: translateY(-5px); 
            background: rgba(56, 189, 248, 0.1); 
        }
        .card h3 { margin: 0; font-size: 20px; }
        .card p { margin: 5px 0 0; font-size: 14px; color: #94a3b8; }
        .footer { position: fixed; bottom: 20px; font-size: 12px; color: #475569; }
    </style>
</head>
<body>
    <h1>ANONDO'S HUB</h1>
    
    <div class="container">
        <a href="/chat-page" class="card">
            <h3>🤖 Anondo AI</h3>
            <p>Chat with your smart assistant</p>
        </a>

        <a href="https://download.anondo.bro.bd" class="card">
            <h3>📥 Media Downloader</h3>
            <p>Download Videos from Social Media</p>
        </a>
    </div>

    <div class="footer">Developed by Anondo Kumar Roy</div>
</body>
</html>
