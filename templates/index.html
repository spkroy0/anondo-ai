<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo AI Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b1120; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #38bdf8; margin-bottom: 10px; object-fit: cover; }
        h1 { font-size: 20px; color: #38bdf8; margin: 5px 0; }
        
        /* Chat UI */
        #chat-window { background: #0f172a; border-radius: 15px; padding: 12px; margin: 15px 0; height: 160px; overflow-y: auto; text-align: left; border: 1px solid #334155; font-size: 13px; }
        .bot { color: #38bdf8; margin-bottom: 8px; }
        .user { color: #ffffff; margin-bottom: 8px; font-weight: 300; }
        
        .input-box { display: flex; gap: 5px; margin-bottom: 20px; }
        #user-input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #0f172a; color: white; outline: none; }
        .send-btn { background: #38bdf8; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Downloader Buttons */
        .dl-section { border-top: 1px dashed #475569; padding-top: 15px; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .v-btn { background: #38bdf8; color: #0b1120; }
        .a-btn { background: #10b981; color: white; }
    </style>
</head>
<body>

<div class="card">
    <img src="{{ url_for('static', filename='spkroy.jpg') }}" alt="Anondo" class="profile-img">
    <h1>Anondo AI Hub</h1>
    <p style="font-size: 11px; color: #94a3b8; margin-bottom: 10px;">Powered by Groq • Llama 3.3</p>

    <div id="chat-window">
        <div class="bot">AI: Ki obostha Anondo? Ami Turmax AI, bolo ki help korte pari?</div>
    </div>
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Banglish e kotha bolo...">
        <button class="send-btn" onclick="askAI()">Send</button>
    </div>

    <div class="dl-section">
        <form action="https://download.anondo.bro.bd/download" method="POST" id="dl-form">
            <input type="text" name="url" placeholder="Paste link (FB, YT, TikTok...)" required>
            <input type="hidden" name="format_type" id="ftype" value="720">
            <div class="btn-grid">
                <button type="button" onclick="startDL('720')" class="btn v-btn">🎬 Video</button>
                <button type="button" onclick="startDL('320k')" class="btn a-btn">🎵 Music</button>
            </div>
        </form>
    </div>
</div>

<script>
    async function askAI() {
        const input = document.getElementById('user-input');
        const window = document.getElementById('chat-window');
        if (!input.value) return;

        window.innerHTML += `<div class="user">You: ${input.value}</div>`;
        const text = input.value;
        input.value = '';

        const res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        });
        const data = await res.json();
        window.innerHTML += `<div class="bot">AI: ${data.response}</div>`;
        window.scrollTop = window.scrollHeight;
    }

    function startDL(type) {
        document.getElementById('ftype').value = type;
        document.getElementById('dl-form').submit();
    }
</script>

</body>
</html>
