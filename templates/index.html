<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo's Social Downloader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:hover { background: #218838; }
        .footer { margin-top: 20px; font-size: 12px; color: #777; }
        label { display: block; text-align: left; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 Social Downloader</h2>
        <p>Design by Anondo</p>
        
        <form action="/download" method="POST">
            <input type="text" name="url" placeholder="Paste Link Here..." required>
            
            <label>Select Format & Quality:</label>
            <select name="format_type">
                <optgroup label="Video (MP4/3GP)">
                    <option value="144">Video - 144p (3GP/MP4)</option>
                    <option value="240">Video - 240p (MP4)</option>
                    <option value="360">Video - 360p (MP4)</option>
                    <option value="720" selected>Video - 720p (HD)</option>
                    <option value="1080">Video - 1080p (Full HD)</option>
                </optgroup>
                <optgroup label="Audio (MP3)">
                    <option value="128a">Audio - 128kbps</option>
                    <option value="212a">Audio - 212kbps</option>
                    <option value="320a">Audio - 320kbps</option>
                    <option value="520a">Audio - 520kbps (Ultra)</option>
                </optgroup>
            </select>

            <button type="submit" class="btn">Download Now</button>
        </form>
        
        <div class="footer">
            <a href="https://anondo.bro.bd" style="text-decoration: none; color: #1a73e8;">← Back to Hub</a>
        </div>
    </div>
</body>
</html>
